server {
  listen 80;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' https://*.googleapis.com https://*.firebaseio.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; frame-src 'none'; object-src 'none';" always;
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  location / {
    root /usr/share/nginx/html;
    index index.html index.htm;
    try_files $uri $uri/ /index.html;
  }
}
